# METAOFFICE nginx 서버 블록
# 배포: 기존 nginx 컨테이너의 conf.d 볼륨 경로에 복사 후 리로드
#   docker exec <nginx-container> nginx -t
#   docker exec <nginx-container> nginx -s reload
#
# 인증서 경로는 nginx 컨테이너 내부 ssl 볼륨 경로에 맞게 확인 후 수정

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name metaoffice.fllab.internal;
    return 301 https://$host$request_uri;
}

# METAOFFICE HTTPS + WebSocket 프록시
server {
    listen 443 ssl;
    server_name metaoffice.fllab.internal;

    # 인증서 (nginx 컨테이너 내부 경로 확인 후 교체)
    ssl_certificate     /etc/nginx/ssl/metaoffice.fllab.internal.crt;
    ssl_certificate_key /etc/nginx/ssl/metaoffice.fllab.internal.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        proxy_pass         http://metaoffice-app:3300;
        proxy_http_version 1.1;

        # WebSocket 업그레이드 (실시간 아바타 동기화 필수)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # WebSocket 장시간 연결 유지 (3D 오피스 상시 접속)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
