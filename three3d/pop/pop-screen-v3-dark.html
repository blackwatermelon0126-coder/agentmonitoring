<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CTR POP · 엔드모듈라인</title>
<!--
  POP Screen v3 Dark — Claude Design(POP 화면 재설계)의 "POP Screen v3 Dark.dc.html"을
  런타임(support.js/x-dc) 의존 없이 self-contained HTML로 충실 이식한 버전.
  METAOFFICE 공장 POP 모니터 클릭 시 모달 iframe으로 로드된다. (원본 디자인/상태 로직 그대로 포팅)
-->
<style>
  html, body { margin:0; padding:0; background:#04080f; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  @keyframes stepPulse {
    0%   { box-shadow:0 0 0 0 rgba(255,86,86,0.65); }
    70%  { box-shadow:0 0 0 12px rgba(255,86,86,0); }
    100% { box-shadow:0 0 0 0 rgba(255,86,86,0); }
  }
  @keyframes stepBlink {
    0%,100% { filter:brightness(1); }
    50%     { filter:brightness(1.45); }
  }
  #pop-root { font-family:'Noto Sans KR',-apple-system,'Malgun Gothic',sans-serif; }
  #pop-root button { font-family:inherit; }
  /* style-active 대응: 눌림 시 살짝 반응 */
  #pop-root button:active { filter:brightness(1.1); }
</style>
</head>
<body>
<div id="pop-root"></div>
<script>
(function () {
  var ACCENT = '#4C8DFF';
  var state = { step: 1, row: 1, menuOpen: false };

  var STEP_LABELS   = ['작업지시 시작','자재투입','에이징 투입','실적등록','라벨발행','포장작업'];
  var PRIMARY_BYSTEP = ['작업지시 시작','자재투입 실행','에이징 투입 실행','실적 등록','라벨 발행','포장 완료 처리'];
  var AUXES     = ['완성품(E/M) 등록','라벨 재발행','시편출고','정보공유'];
  var MENU_ITEMS = ['실적관리','작업내역','자재정보','재고정보','부적합','점검관리','설비보수','비가동','설비등록'];
  var ROWS = [
    { status:'생산', item:'RTR0226A-999', order:720, made:720, remain:0 },
    { status:'대기', item:'RTR0226A-999', order:720, made:0,   remain:720 }
  ];
  var PRODUCED = 0, PLAN = 720, WIP = 0;

  function esc(s){ return String(s); }

  function stepperHtml() {
    var n = STEP_LABELS.length, out = '';
    for (var i = 0; i < n; i++) {
      var done = i < state.step, cur = i === state.step;
      var numBg     = done ? '#1F8A5B' : (cur ? '#E5484D' : '#131E33');
      var numColor  = (done || cur) ? '#fff' : '#5F7190';
      var numBorder = done ? '#1F8A5B' : (cur ? '#FF6B6B' : '#2C3E5E');
      var glow      = cur ? '0 0 0 5px rgba(255,86,86,0.18)' : 'none';
      var anim      = cur ? 'stepPulse 1.4s ease-out infinite, stepBlink 1.4s ease-in-out infinite' : 'none';
      var color     = cur ? '#FF8A8A' : (done ? '#4ED592' : '#788AA6');
      var mark      = done ? '✓' : String(i + 1);
      out += '<button data-act="step" data-i="' + i + '" style="display:flex;flex-direction:column;align-items:center;gap:8px;border:none;background:transparent;cursor:pointer;padding:0;width:112px;">'
           +   '<span style="width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;background:' + numBg + ';color:' + numColor + ';border:2px solid ' + numBorder + ';box-shadow:' + glow + ';animation:' + anim + ';">' + mark + '</span>'
           +   '<span style="font-size:15px;font-weight:700;color:' + color + ';line-height:1.2;text-align:center;white-space:nowrap;">' + esc(STEP_LABELS[i]) + '</span>'
           + '</button>';
      if (i !== n - 1) {
        var lineBg = done ? '#1F8A5B' : '#24344F';
        out += '<div style="flex:1;height:3px;border-radius:3px;background:' + lineBg + ';margin:0 0 26px;"></div>';
      }
    }
    return out;
  }

  function rowsHtml() {
    var out = '';
    for (var i = 0; i < ROWS.length; i++) {
      var d = ROWS[i], sel = i === state.row, prod = d.status === '생산';
      var pct = d.order ? Math.round((d.made / d.order) * 100) : 0;
      var barColor = prod ? '#35C275' : ACCENT;
      var chipBg = prod ? 'rgba(53,194,117,0.14)' : 'rgba(232,176,75,0.13)';
      var chipColor = prod ? '#4ED592' : '#E8B04B';
      var remainColor = d.remain > 0 ? '#F26D6D' : '#5F7190';
      var border = sel ? 'rgba(108,157,255,0.55)' : '#1D2C47';
      var bg = sel ? 'linear-gradient(180deg,#172A4D,#14233F)' : '#111C31';
      var glow = sel ? '0 0 0 3px rgba(76,141,255,0.12)' : 'none';
      var check = sel ? '선택됨 ✓' : '';
      out += '<button data-act="row" data-i="' + i + '" style="border:1px solid ' + border + ';background:' + bg + ';border-radius:14px;padding:12px 14px;cursor:pointer;text-align:left;flex-shrink:0;box-shadow:' + glow + ';">'
           +   '<div style="display:flex;align-items:center;gap:8px;">'
           +     '<span style="font-size:12.5px;font-weight:800;color:' + chipColor + ';background:' + chipBg + ';border-radius:6px;padding:3px 9px;">' + esc(d.status) + '</span>'
           +     '<span style="font-size:17px;font-weight:800;color:#FFFFFF;">' + esc(d.item) + '</span>'
           +     '<div style="flex:1;"></div>'
           +     '<span style="font-size:13px;font-weight:800;color:#8FB6F0;">' + check + '</span>'
           +   '</div>'
           +   '<div style="margin-top:9px;height:8px;background:#1D2C47;border-radius:99px;overflow:hidden;"><div style="height:100%;width:' + pct + '%;background:' + barColor + ';border-radius:99px;"></div></div>'
           +   '<div style="margin-top:7px;display:flex;gap:14px;font-size:13px;color:#5F7190;">'
           +     '<span>지시 <b style="color:#E8EEF6;font-size:14.5px;">' + d.order + '</b></span>'
           +     '<span>생산 <b style="color:#4ED592;font-size:14.5px;">' + d.made + '</b></span>'
           +     '<span>잔여 <b style="color:' + remainColor + ';font-size:14.5px;">' + d.remain + '</b></span>'
           +   '</div>'
           + '</button>';
    }
    return out;
  }

  function auxHtml() {
    return AUXES.map(function (l) {
      return '<button style="height:48px;border-radius:12px;border:1px solid rgba(143,182,240,0.14);background:transparent;color:#9FB2CC;font-size:14px;font-weight:600;cursor:pointer;line-height:1.15;">' + esc(l) + '</button>';
    }).join('');
  }

  function menuHtml() {
    if (!state.menuOpen) return '';
    var items = MENU_ITEMS.map(function (l) {
      return '<button data-act="menu" style="height:64px;border-radius:11px;border:1.5px solid #24344F;background:#18253D;color:#DCE6F4;font-size:16px;font-weight:700;cursor:pointer;">' + esc(l) + '</button>';
    }).join('');
    return '<div data-act="menu" style="position:absolute;inset:0;background:rgba(3,7,14,0.7);z-index:50;display:flex;align-items:flex-start;justify-content:center;padding-top:66px;">'
         +   '<div style="background:#131E33;border:1px solid #24344F;border-radius:16px;padding:20px;width:640px;box-shadow:0 20px 60px rgba(0,0,0,0.6);">'
         +     '<div style="font-size:17px;font-weight:900;margin-bottom:14px;color:#FFFFFF;">전체 메뉴</div>'
         +     '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">' + items + '</div>'
         +   '</div>'
         + '</div>';
  }

  function render() {
    var pct = PLAN ? Math.round((PRODUCED / PLAN) * 100) : 0;
    var circ = 2 * Math.PI * 72;
    var ringDash = (circ * pct / 100) + ' ' + circ;
    var statusLabel = state.step === 0 ? '시작 가능' : '진행 중';
    var primaryLabel = PRIMARY_BYSTEP[state.step];
    var remain = PLAN - PRODUCED;

    document.getElementById('pop-root').innerHTML =
    '<div style="width:1024px;height:768px;background:#0B1322;color:#E8EEF6;display:flex;flex-direction:column;overflow:hidden;user-select:none;position:relative;font-variant-numeric:tabular-nums;">'
    + '<header style="height:54px;background:#070D18;border-bottom:1px solid #1C2A44;display:flex;align-items:center;gap:14px;padding:0 14px;flex-shrink:0;">'
    +   '<div style="display:flex;align-items:baseline;gap:8px;"><span style="font-size:13px;font-weight:500;color:#5F7190;">LINE</span><span style="font-size:25px;font-weight:900;letter-spacing:1px;color:#fff;">2151</span></div>'
    +   '<div style="width:1px;height:24px;background:#1C2A44;"></div>'
    +   '<div style="font-size:15.5px;font-weight:700;color:#DCE6F4;">엔드모듈라인</div>'
    +   '<span style="display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:#4ED592;background:rgba(53,194,117,0.14);border-radius:99px;padding:5px 11px;"><span style="width:7px;height:7px;border-radius:50%;background:#35C275;"></span>Online</span>'
    +   '<span style="font-size:12.5px;color:#5F7190;">공장월력 가동일 · VGF</span>'
    +   '<div style="flex:1;"></div>'
    +   '<div style="font-size:16px;font-weight:800;color:#fff;">2026-07-06 <span style="color:#6FA5F5;">월</span></div>'
    +   '<button data-act="menu" style="height:40px;padding:0 16px;border-radius:10px;border:none;background:rgba(143,182,240,0.1);color:#B9C8DE;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;"><span style="display:flex;flex-direction:column;gap:3px;"><span style="width:14px;height:1.5px;background:#8FB6F0;border-radius:2px;"></span><span style="width:14px;height:1.5px;background:#8FB6F0;border-radius:2px;"></span><span style="width:14px;height:1.5px;background:#8FB6F0;border-radius:2px;"></span></span>메뉴</button>'
    +   '<button data-act="refresh" style="width:40px;height:40px;border-radius:10px;border:none;background:rgba(143,182,240,0.1);cursor:pointer;display:flex;align-items:center;justify-content:center;"><svg width="17" height="17" viewBox="0 0 16 16" fill="none"><path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9M13.5 1.5v3h-3" stroke="#6FA5F5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></button>'
    + '</header>'
    + '<div style="background:#0E1729;border-bottom:1px solid #1C2A44;padding:14px 20px 12px;flex-shrink:0;"><div style="display:flex;align-items:center;">' + stepperHtml() + '</div></div>'
    + '<div style="flex:1;display:flex;gap:12px;padding:12px 14px;min-height:0;">'
    +   '<section style="flex:13;background:#111C31;border:1px solid #24344F;border-radius:16px;display:flex;flex-direction:column;padding:18px 20px 16px;min-width:0;">'
    +     '<div style="display:flex;align-items:center;gap:8px;"><span style="font-size:13px;font-weight:800;color:#4ED592;background:rgba(53,194,117,0.14);border-radius:7px;padding:5px 11px;">' + statusLabel + '</span><span style="font-size:13px;font-weight:800;color:#E8B04B;background:rgba(232,176,75,0.13);border-radius:7px;padding:5px 11px;">완성품</span><div style="flex:1;"></div><span style="font-size:13.5px;font-weight:700;color:#5F7190;">지시번호 <b style="color:#B9C8DE;">2151-260706-M-001</b></span></div>'
    +     '<div style="margin-top:14px;"><div style="font-size:36px;font-weight:900;letter-spacing:0.5px;color:#FFFFFF;line-height:1.1;">RTR0226A-999</div><div style="font-size:20px;font-weight:700;color:#B9C8DE;margin-top:4px;">DL3 TIE ROD ASSY RH</div><div style="font-size:14px;color:#5F7190;margin-top:6px;">고객품번 <b style="color:#B9C8DE;">L257704100</b> · 차종 <b style="color:#B9C8DE;">DH PE Sports</b> · 계획일 2026-07-06 (월)</div></div>'
    +     '<div style="flex:1;display:flex;align-items:center;gap:26px;margin-top:8px;">'
    +       '<div style="position:relative;width:170px;height:170px;flex-shrink:0;"><svg width="170" height="170" viewBox="0 0 170 170"><circle cx="85" cy="85" r="72" fill="none" stroke="#1D2C47" stroke-width="16"></circle><circle cx="85" cy="85" r="72" fill="none" stroke="' + ACCENT + '" stroke-width="16" stroke-linecap="round" stroke-dasharray="' + ringDash + '" transform="rotate(-90 85 85)"></circle></svg><div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;"><div style="font-size:40px;font-weight:900;color:#FFFFFF;line-height:1;">' + pct + '%</div><div style="font-size:13px;font-weight:700;color:#5F7190;margin-top:4px;">달성률</div></div></div>'
    +       '<div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:10px;">'
    +         '<div style="background:#18253D;border-radius:12px;padding:12px 16px;"><div style="font-size:13px;font-weight:700;color:#788AA6;">생산수량</div><div style="font-size:30px;font-weight:900;color:#FFFFFF;">' + PRODUCED + '</div></div>'
    +         '<div style="background:#18253D;border-radius:12px;padding:12px 16px;"><div style="font-size:13px;font-weight:700;color:#788AA6;">계획수량</div><div style="font-size:30px;font-weight:900;color:#FFFFFF;">' + PLAN + '</div></div>'
    +         '<div style="background:#18253D;border-radius:12px;padding:12px 16px;"><div style="font-size:13px;font-weight:700;color:#788AA6;">작업중</div><div style="font-size:30px;font-weight:900;color:#FFFFFF;">' + WIP + '</div></div>'
    +         '<div style="background:#18253D;border-radius:12px;padding:12px 16px;"><div style="font-size:13px;font-weight:700;color:#788AA6;">잔여수량</div><div style="font-size:30px;font-weight:900;color:#F26D6D;">' + remain + '</div></div>'
    +       '</div>'
    +     '</div>'
    +     '<button data-act="primary" style="height:80px;border-radius:16px;border:none;background:linear-gradient(180deg,#4E8EF7 0%,#2F6BE0 100%);color:#fff;font-size:22px;font-weight:800;cursor:pointer;box-shadow:inset 0 1px 0 rgba(255,255,255,0.22),0 8px 24px rgba(47,107,224,0.28);display:flex;align-items:center;justify-content:center;gap:12px;flex-shrink:0;"><span style="width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;"><svg width="13" height="15" viewBox="0 0 14 16" fill="none"><path d="M1.5 1.7v12.6c0 .8.9 1.3 1.6.9l10-6.3c.6-.4.6-1.4 0-1.8l-10-6.3c-.7-.4-1.6.1-1.6.9z" fill="#fff"/></svg></span>' + primaryLabel + '</button>'
    +   '</section>'
    +   '<section style="flex:8;display:flex;flex-direction:column;gap:10px;min-width:0;">'
    +     '<div style="display:flex;align-items:center;justify-content:space-between;padding:2px 4px 0;"><div style="font-size:15px;font-weight:800;color:#C9D6E8;">작업 대기열 <span style="color:#5F7190;font-weight:500;">' + ROWS.length + '건</span></div><button style="height:36px;padding:0 14px;border-radius:99px;border:none;background:rgba(143,182,240,0.1);color:#9FB2CC;font-size:13px;font-weight:600;cursor:pointer;">작업지시 변경</button></div>'
    +     '<div style="flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto;min-height:0;">' + rowsHtml() + '</div>'
    +     '<div style="flex-shrink:0;"><div style="font-size:12.5px;font-weight:800;color:#5F7190;letter-spacing:1px;padding:0 4px 6px;">보조 기능</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;">' + auxHtml() + '</div></div>'
    +   '</section>'
    + '</div>'
    + menuHtml()
    + '</div>';
  }

  // 이벤트 위임: data-act 로 상태 전이
  document.getElementById('pop-root').addEventListener('click', function (e) {
    var t = e.target.closest('[data-act]');
    if (!t) return;
    var act = t.getAttribute('data-act');
    if (act === 'step')       state.step = parseInt(t.getAttribute('data-i'), 10);
    else if (act === 'row')   state.row = parseInt(t.getAttribute('data-i'), 10);
    else if (act === 'primary') state.step = Math.min(state.step + 1, STEP_LABELS.length - 1);
    else if (act === 'menu')  state.menuOpen = !state.menuOpen;
    else if (act === 'refresh') { /* re-render */ }
    render();
  });

  render();
})();
</script>
</body>
</html>
